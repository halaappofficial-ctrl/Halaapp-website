<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HALA MOVE — Payment received</title>
<meta name="robots" content="noindex">
<style>
  html,body{ margin:0; padding:0; background:#0A0A0A; color:#FFFFFF;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif; }
  .wrap{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; box-sizing:border-box; text-align:center; }
  .tick{ width:76px; height:76px; border-radius:38px; margin-bottom:26px;
    background:rgba(92,181,88,0.14); border:2px solid #5CB558; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 10px rgba(92,181,88,0.06); }
  .wordmark{ font-weight:900; font-size:34px; letter-spacing:1px; margin-bottom:22px; }
  .wordmark .h{ color:#5CB558; } .wordmark .m{ color:#FFFFFF; }
  h1{ font-size:24px; font-weight:700; margin:0 0 12px; }
  p{ font-size:16px; line-height:1.55; opacity:0.85; max-width:400px; margin:0 0 22px; }
  .hint{ font-size:13px; opacity:0.5; }
</style>
</head>
<body>
<main class="wrap">
  <div class="tick">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#5CB558" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5 11-11"/></svg>
  </div>
  <div class="wordmark"><span class="h">HALA</span> <span class="m">MOVE</span></div>
  <h1>Payment received</h1>
  <p>Your payment is secured in escrow. Return to the HALA MOVE app to continue with your job — it will update automatically.</p>
  <p class="hint">You can safely close this tab.</p>
</main>
</body>
</html>
