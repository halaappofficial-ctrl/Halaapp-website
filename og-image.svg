      <tspan fill="#5CB558">HALA</tspan><tspan fill="#FFFFFF"> MOVE</tspan>
    </text>
  </g>

  <g transform="translate(600, 310)">
    <text text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
