<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5CB558" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#5CB558" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#5CB558" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5CB558"/>
      <stop offset="100%" stop-color="#7DCB79"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="500" fill="url(#glow)"/>

  <rect x="60" y="60" width="1080" height="510" rx="24" ry="24"
